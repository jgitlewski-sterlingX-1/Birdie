# Reverse-proxy /api to the Node API running on 127.0.0.1:8787.
#
# On Cloudways the per-app Nginx vhost lives at
#   /etc/nginx/sites-available/<app-folder>
# Add this location block INSIDE the existing `server { ... }` block,
# above the generic `location / { ... }` so it takes precedence.
#
# After editing:  sudo nginx -t && sudo service nginx reload

location /api/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
