name: Deploy to production

# Push to main → build the Docker image and deploy to Cloud Run.
# Shipping is decoupled from releasing: code can land dark and be turned on per
# role in the in-app feature-flag admin panel.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two production deploys at once.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  GCP_PROJECT: sterlingx-relay-499618
  GCP_REGION: us-central1
  SERVICE_NAME: relay-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GCP.
      # Option A (current): service account JSON key stored as GCP_SA_KEY secret.
      # Option B (preferred): swap to Workload Identity Federation — set
      #   workload_identity_provider and service_account inputs instead of credentials_json.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: relay/kanban
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/relay/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # Deploy the new image. Existing env vars / secrets on the service are
      # preserved — only the image is updated. Secrets (MYSQL_PASSWORD,
      # GMAIL_CLIENT_SECRET, etc.) stay in Secret Manager and are not re-set here.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --quiet
