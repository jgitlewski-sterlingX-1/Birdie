name: Deploy to production

# Push to main → build the SPA and deploy both the SPA and the API to Cloudways.
# Shipping is decoupled from releasing: code can land dark and be turned on per
# role in the in-app feature-flag admin panel.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two production deploys at once.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SPA
        working-directory: relay/kanban
        run: |
          npm ci
          npm run build

      # Secrets are passed via env (not inline) so the runner's shell never
      # expands values — critical for the redeploy command, whose $HOME must
      # expand on the SERVER, not the runner.
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.CLOUDWAYS_HOST }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "::error::Deploy secrets missing (CLOUDWAYS_SSH_KEY / CLOUDWAYS_HOST). Set them in repo Settings → Secrets." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy SPA to webroot
        # Sync the built bundle into the Cloudways webroot. --delete prunes old
        # hashed assets; .htaccess is preserved in case it carries SPA routing.
        env:
          DEPLOY_USER: ${{ secrets.CLOUDWAYS_USER }}
          DEPLOY_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          DEPLOY_WEBROOT: ${{ secrets.CLOUDWAYS_WEBROOT }}
        run: |
          rsync -az --delete --exclude='.htaccess' \
            -e "ssh -i ~/.ssh/id_deploy" \
            relay/kanban/dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WEBROOT/"

      - name: Redeploy API
        # Server-side redeploy (reset API checkout to origin/main, install runtime
        # deps, reload pm2). $HOME in the command expands on the server.
        env:
          DEPLOY_USER: ${{ secrets.CLOUDWAYS_USER }}
          DEPLOY_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          REDEPLOY_CMD: ${{ secrets.CLOUDWAYS_API_REDEPLOY_CMD }}
        run: |
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "$REDEPLOY_CMD"
